spring:
  application:
    name: todoist-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/todoist
    username: todoist
    password: todoist

  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only validates entities against it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            # Real values come from env vars (never committed). Placeholders keep
            # the app booting until you provide them; login fails until then.
            client-id: ${GOOGLE_CLIENT_ID:placeholder-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder-client-secret}
            scope:
              - openid
              - profile
              - email

server:
  port: 8080

app:
  # Frontend origin allowed for CORS (Vite dev server). Comma-separated for more.
  cors:
    allowed-origins: http://localhost:5173
  # Where to send the browser after a successful Google login.
  frontend-url: http://localhost:5173
  jwt:
    # HS256 secret (>=32 bytes). Override in prod via APP_JWT_SECRET env var.
    secret: ${APP_JWT_SECRET:dev-secret-change-me-please-32bytes-minimum-0123456789}
    # Token lifetime in milliseconds (7 days for now; refresh-token upgrade later).
    expiration-ms: 604800000
    cookie-name: TODOIST_TOKEN
