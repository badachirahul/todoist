spring:
  application:
    name: todoist-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/todoist
    username: todoist
    password: todoist

  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only validates entities against it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

# Frontend origin allowed for CORS (Vite dev server). Comma-separated for more.
app:
  cors:
    allowed-origins: http://localhost:5173
